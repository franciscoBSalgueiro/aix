#
# This workflow calls the main distribution pipeline from DuckDB to build, test and release the extension
#
name: Main Extension Distribution Pipeline
on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' && github.sha || '' }}
  cancel-in-progress: true

jobs:
  duckdb-stable-build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.4-andium
    with:
      duckdb_version: v1.5.1
      ci_tools_version: v1.5-variegata
      extension_name: aixchess
      extra_toolchains: rust
      exclude_archs: 'wasm_mvp;wasm_eh;wasm_threads'
      opt_in_archs: windows_arm64

  create-github-release:
    name: Create GitHub Release
    needs: duckdb-stable-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit tag
        id: get_tag
        run: |
          # Try to get the exact tag of the current commit.
          # If the commit isn't tagged, it falls back to "dev-" plus the short commit SHA.
          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || echo "dev-${GITHUB_SHA::7}")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          
      - name: Download all extension artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: aixchess-*
          path: release-artifacts
          merge-multiple: true
          
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: Release ${{ steps.get_tag.outputs.tag }}
          files: release-artifacts/* # Attaches all the binaries downloaded in the previous step
          draft: false
          prerelease: false